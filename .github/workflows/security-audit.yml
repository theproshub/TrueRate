name: Security audit

on:
  schedule:
    - cron: '0 9 1 * *'   # 1st of each month at 09:00 UTC
  pull_request:
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - name: Check for outdated packages
        run: npm outdated || true
